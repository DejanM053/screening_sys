version: "3.9"

# Day-1 compose — only what's needed to run the demo.
# No: Neo4j, Elasticsearch, PostgreSQL, MinIO, Ollama, Celery workers.
# Graph engine uses networkx in-memory. Entity resolution falls back to
# OpenSanctions API. Explanation text uses pre-generated stubs.

networks:
  sanctions-net:
    driver: bridge

volumes:
  redis_data:
  yente_data:
  es_data:
  pg_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sanctions-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sanctions_db
      - POSTGRES_USER=sanctions
      - POSTGRES_PASSWORD=sanctions_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sanctions-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanctions -d sanctions_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanctions-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sanctions-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: sanctions-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - sanctions-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 5

  yente:
    image: ghcr.io/opensanctions/yente:latest
    container_name: sanctions-yente
    restart: unless-stopped
    environment:
      - YENTE_MANIFEST=/app/manifests/civic.yml
      - YENTE_UPDATE_SCHEDULE=0 6 * * *
      - YENTE_INDEX_URL=http://elasticsearch:9200
      - YENTE_AUTO_REINDEX=true
    volumes:
      - yente_data:/var/lib/yente
    ports:
      - "8010:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - sanctions-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5

  entity-resolution:
    build: ./domains/entity-resolution
    container_name: sanctions-entity-resolution
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENSANCTIONS_URL=http://yente:8000
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sanctions-net

  graph-engine:
    build: ./domains/graph-engine
    container_name: sanctions-graph-engine
    restart: unless-stopped
    # No Neo4j — uses networkx in-memory graph
    ports:
      - "8005:8005"
    networks:
      - sanctions-net

  regulatory-engine:
    build: ./domains/regulatory-engine
    container_name: sanctions-regulatory-engine
    restart: unless-stopped
    ports:
      - "8003:8003"
    networks:
      - sanctions-net

  crypto-screener:
    build: ./domains/crypto-screener
    container_name: sanctions-crypto-screener
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - TRONGRID_API_KEY=${TRONGRID_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sanctions-net

  review-queue:
    build: ./domains/review-queue
    container_name: sanctions-review-queue
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      # AUDIT_TRAIL_URL not set — queue falls back to no-op audit logging
    ports:
      - "8009:8009"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sanctions-net

  llm-service:
    build: ./domains/llm-service
    container_name: sanctions-llm-service
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_TIMEOUT_SECONDS=120
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8006:8006"
    networks:
      - sanctions-net

  screening-api:
    build: ./domains/screening-api
    container_name: sanctions-screening-api
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - ENTITY_RESOLUTION_URL=http://entity-resolution:8002
      - GRAPH_ENGINE_URL=http://graph-engine:8005
      - REGULATORY_ENGINE_URL=http://regulatory-engine:8003
      - CRYPTO_SCREENER_URL=http://crypto-screener:8004
      - REVIEW_QUEUE_URL=http://review-queue:8009
      - LLM_SERVICE_URL=http://llm-service:8006
      # Challenge System additions
      - POSTGRES_URL=postgresql://sanctions:sanctions_pass@postgres:5432/sanctions_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sanctions-net

  frontend:
    build: ./frontend
    container_name: sanctions-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_REVIEW_QUEUE_URL=http://localhost:8009
    ports:
      - "3000:3000"
    networks:
      - sanctions-net
