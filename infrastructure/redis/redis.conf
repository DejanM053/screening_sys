# Sanctions Screening System — Redis configuration
# Used for: KYB wallet registry, OFAC wallet sorted set, hop-trace cache (24h TTL),
# freeze-risk register, entity-resolution match cache, list-sync staging.

maxmemory 256mb
maxmemory-policy allkeys-lru

# Persist periodically so the KYB wallet registry and freeze-risk register
# survive restarts; LRU eviction only applies once maxmemory is reached.
save 900 1
save 300 10

appendonly yes
appendfsync everysec

bind 0.0.0.0
protected-mode no
